let openPrompt = null;

function calcDays() {
  const d = Math.ceil((new Date('2026-06-01') - new Date()) / 86400000);
  const el = document.getElementById('days-badge');
  if (el) el.textContent = d > 0 ? `距今 ${d} 天` : '已施行';
}

function filter(level, btn) {
  cur = level;
  document.querySelectorAll('.fbtn').forEach(b => b.classList.remove('on'));
  btn.classList.add('on');
  render();
}

function render() {
  const filtered = cur === 'all' ? changes : changes.filter(c => c.level === cur);
  document.getElementById('count-lbl').textContent = `共 ${filtered.length} 条`;
  const bc = { high:'var(--color-border-danger)', mid:'var(--color-border-warning)', low:'var(--color-border-tertiary)' };
  document.getElementById('change-list').innerHTML = filtered.map(c => {
    const i = changes.indexOf(c);
    return `<div class="change-card card-relative" style="border:0.5px solid ${bc[c.level]}">
      <div class="change-head" onclick="tog(${i})">
        <span class="badge ${bcls[c.level]}">${lbl[c.level]}</span>
        <span class="change-art">${c.article}</span>
        <span class="change-title">${c.topic}</span>
        <span class="change-toggle" id="arr${i}">▸ 展开</span>
      </div>
      <div class="change-body" id="det${i}">
        <div class="compare-grid">
          <div class="compare-box" style="background:var(--color-background-secondary)">
            <div class="compare-lbl" style="background:var(--color-background-secondary);color:var(--color-text-secondary)">旧条例</div>
            <div style="font-size:12px;color:var(--color-text-primary)">${c.old}</div>
          </div>
          <div class="compare-box" style="background:var(--color-background-info)">
            <div class="compare-lbl" style="background:var(--color-background-info);color:var(--color-text-info)">新条例规定</div>
            <div style="font-size:12px;color:var(--color-text-info)">${c.new_rule}</div>
          </div>
        </div>
        <div class="contract-box">
          <div class="contract-lbl">合同修订要点</div>
          <div class="contract-txt">${c.contract}</div>
        </div>
        <div class="risk-note">${c.risk}</div>

        <button class="gen-btn" onclick="event.stopPropagation();showPrompt(${i})">
          <span class="gen-btn-ico">⬡</span> 生成修订提示词
        </button>

        <div class="prompt-overlay" id="po${i}">
          <div class="prompt-header">
            <div class="prompt-title">修订提示词 · ${c.article} ${c.topic}</div>
            <button class="prompt-close" onclick="event.stopPropagation();hidePrompt(${i})">×</button>
          </div>
          <div class="prompt-desc">复制提示词 → 粘贴至企业微信DeepSeek或法务AI助手 → 直接获得可用合同条款文字</div>
          <div class="prompt-box" id="pb${i}"></div>
          <div class="prompt-actions">
            <button class="btn-copy" id="cb${i}" onclick="event.stopPropagation();copyPrompt(${i})">复制提示词</button>
            <button class="btn-outline" onclick="event.stopPropagation();hidePrompt(${i})">关闭</button>
            <span class="prompt-hint" id="ph${i}">适用场景：${c.prompt_note}</span>
          </div>
        </div>
      </div>
    </div>`;
  }).join('');
}

function tog(i) {
  const d = document.getElementById('det' + i);
  const a = document.getElementById('arr' + i);
  if (!d) return;
  const open = d.style.display === 'block';
  d.style.display = open ? 'none' : 'block';
  a.textContent = open ? '▸ 展开' : '▾ 收起';
  if (open && openPrompt === i) { hidePrompt(i); openPrompt = null; }
}

function showPrompt(i) {
  if (openPrompt !== null && openPrompt !== i) hidePrompt(openPrompt);
  const c = changes[i];
  const full = `${IDENTITY}\n\n${c.prompt_suffix}`;
  const el = document.getElementById('pb' + i);
  if (el) el.textContent = full;
  const po = document.getElementById('po' + i);
  if (po) po.classList.add('open');
  openPrompt = i;
}

function hidePrompt(i) {
  const po = document.getElementById('po' + i);
  if (po) po.classList.remove('open');
  const cb = document.getElementById('cb' + i);
  if (cb) { cb.textContent = '复制提示词'; cb.classList.remove('copied'); }
  if (openPrompt === i) openPrompt = null;
}

function copyPrompt(i) {
  const c = changes[i];
  const full = `${IDENTITY}\n\n${c.prompt_suffix}`;
  navigator.clipboard?.writeText(full).then(() => {
    const cb = document.getElementById('cb' + i);
    if (cb) { cb.textContent = '已复制 ✓'; cb.classList.add('copied'); }
    setTimeout(() => {
      const cb2 = document.getElementById('cb' + i);
      if (cb2) { cb2.textContent = '复制提示词'; cb2.classList.remove('copied'); }
    }, 2000);
  });
}

calcDays();
render();
</script>
</body>
</html>
